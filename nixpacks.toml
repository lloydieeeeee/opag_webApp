[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.mysqli",
  "php82Extensions.pdo_mysql",
  "php82Extensions.mbstring",
  "php82Extensions.xml",
  "php82Extensions.tokenizer",
  "php82Extensions.curl",
  "php82Extensions.zip",
  "php82Extensions.gd",
  "php82Extensions.opcache",
  "php82Extensions.sodium",
  "php82Extensions.fileinfo",
  "php82Extensions.bcmath",
  "composer-php82"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --ignore-platform-reqs"]

[phases.build]
cmds = [
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
